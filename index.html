<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        (function () {
            const AUTH_USER_KEY = 'student_auth_v1';
            try {
                const raw = localStorage.getItem(AUTH_USER_KEY);
                if (raw) {
                    const user = JSON.parse(raw);
                    if (user && user.userId === 'admin') {
                        window.location.replace('Admin_Panel.html');
                        return;
                    } else if (user && user.role === 'school') {
                        window.location.replace('School_Panel.html');
                        return;
                    }
                }
            } catch (e) {
                console.error("Routing error:", e);
            }
            window.location.replace('Login_Panel.html');
        })();
    </script>
</head>

<body style="margin: 0; padding: 0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafd; color: #444746;">
    <div style="text-align: center;">
        <div style="width: 48px; height: 48px; border: 4px solid #10b981; border-top-color: transparent; border-radius: 50%; animate: spin 1s linear infinite; margin: 0 auto 16px; animation: spin 1s linear infinite;"></div>
        <div style="font-weight: 600; font-size: 16px;">Redirecting...</div>
    </div>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>

</html>
